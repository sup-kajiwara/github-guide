# ===== サイト全体の設定 =====
site_name: はじめてのGitHub 入門ガイド
site_description: 非エンジニア向け・GitHubをやさしく学ぶ入門ガイド
site_author: はじめてのGitHub 入門ガイド
# GitHub Pages で公開するときのURL
site_url: "https://sup-kajiwara.github.io/github-guide/"

# ===== 見た目（Material テーマ）=====
theme:
  name: material
  language: ja               # 画面表示を日本語に
  features:
    - navigation.instant     # ページ遷移を高速に
    - navigation.top         # 「トップへ戻る」ボタン
    - navigation.footer      # 前/次ページへのリンク
    - search.highlight       # 検索ヒット箇所をハイライト
    - search.suggest         # 検索の候補表示
    - content.code.copy      # コードのコピーボタン
    - toc.follow             # 目次が読んでいる位置に追従
  icon:
    logo: material/book-open-page-variant   # ヘッダーのロゴ（画像不要のアイコン）
  palette:
    # ライトモード
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: ダークモードに切り替え
    # ダークモード
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: ライトモードに切り替え

# images/ 配下（スクショ置き場）はメニューに出さない
not_in_nav: |
  /images/

# ===== サイドメニューの構成（章立て）=====
# グループは折りたたみ式。いま見ている章のグループだけ自動で開きます。
nav:
  - はじめに: index.md
  - 用語集（まずはここから）: glossary.md
  - AIで開発するとは: ai-intro.md
  - 準備する:
      - アカウント作成と初期設定: account-setup.md
      - PCの準備（VSCode・Git・Claude）: setup-pc.md
  - GitHubの基本:
      - 最初の一歩（リポジトリを作る）: first-steps.md
      - 変更を記録する（コミット）: commit-push.md
      - みんなで使う（プルリク・マージ）: collaboration.md
  - つくってみる:
      - 練習：通しでやってみる: practice.md
      - AIで作ってみる（ハンズオン）: ai-build.md
  - デザインを言葉で伝える: design-vocab.md
  - エラーとの付き合い方: ai-errors.md
  - 安全に使う:
      - 情報を守る（GitHub）: security.md
      - AIと安全に付き合う: ai-safety.md
  - もっと深く:
      - 推奨技術スタック: tech-stack.md
      - もっと使う（上級編）: advanced.md
      - 困ったときのQ&A: troubleshooting.md
      - 付録：Claudeの頼み方とMarkdown: appendix.md

# ===== 検索機能 =====
plugins:
  - search

# ===== Markdownの拡張機能（注釈ボックスや表などを使えるように）=====
markdown_extensions:
  - admonition               # !!! note のような注釈ボックス
  - pymdownx.details         # 折りたたみ
  - pymdownx.superfences:     # コードブロックの強化＋図（Mermaid）対応
      custom_fences:
        - name: mermaid       # ```mermaid``` で流れ図・シーケンス図を描ける
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:          # タブ切り替え（例：ブラウザ操作とVSCode操作を並べる）
      alternate_style: true
  - pymdownx.emoji:           # :material-xxx: などのアイコンを本文で使えるように
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:       # - [ ] / - [x] をチェックボックスで表示
      custom_checkbox: true
  - attr_list                # 画像サイズ指定などの属性
  - md_in_html
  - toc:
      permalink: true        # 見出しにリンクアイコンを付与

# ===== フッター =====
copyright: © はじめてのGitHub 入門ガイド
